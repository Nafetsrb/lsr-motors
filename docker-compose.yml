version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lsrmotors
      POSTGRES_PASSWORD: lsrmotors_dev
      POSTGRES_DB: lsrmotors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
