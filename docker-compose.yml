version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lsrmotors
      POSTGRES_PASSWORD: lsrmotors_dev
      POSTGRES_DB: lsrmotors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lsrmotors -d lsrmotors"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://lsrmotors:lsrmotors_dev@postgres:5432/lsrmotors
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://lsrmotors:lsrmotors_dev@postgres:5432/lsrmotors
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
